<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDITEC — Portail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f 0%,#2d6a9f 100%);padding:20px}
.login-box{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{height:60px;margin-bottom:12px}
.login-logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#1e3a5f,#2d6a9f);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px}
.login-logo h1{font-size:24px;font-weight:700;color:#1e3a5f}
.login-logo p{font-size:13px;color:#666;margin-top:3px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:6px}
.form-group input{width:100%;border:2px solid #e0e5ef;border-radius:9px;padding:12px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;color:#1a1a2e}
.form-group input:focus{border-color:#2d6a9f}
.btn-login{width:100%;background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;border:none;border-radius:9px;padding:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:6px;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.login-err{background:#fff0f0;border:1px solid #ffcccc;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.login-err.show{display:block}

/* ── PORTAIL ── */
.portal-page{display:none;min-height:100vh;background:#f4f6f9}
.portal-page.show{display:block}

.topbar{background:#fff;border-bottom:2px solid #e0e5ef;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-icon{width:40px;height:40px;background:linear-gradient(135deg,#1e3a5f,#2d6a9f);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.topbar-name{font-size:18px;font-weight:700;color:#1e3a5f}
.topbar-sub{font-size:11px;color:#888;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-badge{background:#e8f0fb;border:1px solid #bfd0f0;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:#1e3a5f;display:flex;align-items:center;gap:7px}
.user-dot{width:8px;height:8px;background:#27ae60;border-radius:50%}
.btn-logout{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;font-size:13px;color:#666;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-logout:hover{background:#fff0f0;color:#c0392b;border-color:#ffcccc}

.portal-body{max-width:1100px;margin:0 auto;padding:32px 24px}
.welcome-bar{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);border-radius:14px;padding:24px 28px;color:#fff;margin-bottom:28px}
.welcome-bar h2{font-size:22px;font-weight:700;margin-bottom:4px}
.welcome-bar p{font-size:14px;opacity:.85}

.section-title{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}

.app-card{background:#fff;border:2px solid #e0e5ef;border-radius:14px;padding:22px;cursor:pointer;transition:all .2s;text-decoration:none;display:block;position:relative}
.app-card:hover{border-color:#2d6a9f;box-shadow:0 6px 24px rgba(45,106,159,.15);transform:translateY(-2px)}
.app-card.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.app-card-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.app-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.app-icon.blue{background:#e8f0fb}
.app-icon.green{background:#e8f8ef}
.app-icon.amber{background:#fef6e8}
.app-icon.purple{background:#f3eeff}
.app-card-title{font-size:16px;font-weight:700;color:#1a1a2e}
.app-card-desc{font-size:13px;color:#555;line-height:1.6;margin-bottom:14px}
.app-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:10px}
.app-status.available{background:#e8f8ef;color:#1a7a3c}
.app-status.soon{background:#f0f0f0;color:#999}
.app-status.locked{background:#fff0f0;color:#c0392b}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.user-card{background:#fff;border:2px solid #e0e5ef;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.user-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;color:#fff}
.user-av.admin{background:#c0392b}
.user-av.commercial{background:#2980b9}
.user-av.technicien{background:#27ae60}
.user-info-name{font-size:14px;font-weight:600;color:#1a1a2e}
.user-info-id{font-size:11px;color:#888;margin-top:1px}
.role-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:4px}
.role-pill.admin{background:#fff0f0;color:#c0392b}
.role-pill.commercial{background:#e8f0fb;color:#1e3a5f}
.role-pill.technicien{background:#e8f8ef;color:#1a7a3c}

footer{background:#fff;border-top:2px solid #e0e5ef;padding:14px 32px;display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:20px}

@media(max-width:600px){
  .topbar{padding:0 16px} .portal-body{padding:16px}
  .apps-grid{grid-template-columns:1fr} .login-box{padding:28px 20px}
  .topbar-sub{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🏥</div>
      <h1>MEDITEC</h1>
      <p>Portail applicatif interne</p>
    </div>
    <div class="login-err" id="loginErr">Identifiant ou mot de passe incorrect.</div>
    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" id="loginUser" placeholder="votre identifiant" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- PORTAIL -->
<div class="portal-page" id="portalPage">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">🏥</div>
      <div>
        <div class="topbar-name">MEDITEC</div>
        <div class="topbar-sub">Portail applicatif interne</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-dot"></div>
        <span id="userLabel">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="portal-body">
    <div class="welcome-bar">
      <h2 id="welcomeTitle">Bonjour !</h2>
      <p id="welcomeSub">Sélectionnez une application.</p>
    </div>

    <div class="section-title">Applications</div>
    <div class="apps-grid" id="appsGrid"></div>

    <div id="adminSection" style="display:none">
      <div class="section-title">Gestion des utilisateurs</div>
      <div class="users-grid" id="usersGrid"></div>
    </div>
  </div>

  <footer>
    <span>MEDITEC — Portail interne v1.0</span>
    <span id="footerInfo"></span>
  </footer>
</div>

<script>
const USERS = [
  {id:'jean',      nom:'Jean',         password:'Meditec2024!', role:'admin',      acces:['vph','psdm','planning','stock']},
  {id:'commercial1',nom:'Commercial 1',password:'Com2024!',     role:'commercial', acces:['vph']},
  {id:'commercial2',nom:'Commercial 2',password:'Com2024B!',    role:'commercial', acces:['vph']},
  {id:'tech1',     nom:'Technicien 1', password:'Tech2024!',    role:'technicien', acces:['psdm']},
  {id:'tech2',     nom:'Technicien 2', password:'Tech2024B!',   role:'technicien', acces:['psdm']},
];

const APPS = [
  {id:'vph',      nom:'MediFlow VPH',       desc:'Gestion des dossiers clients VPH — Fiche évaluation, préconisation, DEP/DAP, suivi CPAM/CRAMIF', icon:'♿', color:'blue',   url:'vph/index.html', actif:true},
  {id:'psdm',     nom:'PSDM Manager',       desc:'Suivi des équipements, maintenance, désinfection, interventions techniciens terrain',              icon:'🔧', color:'green',  url:'https://78500meditec.github.io/psdm/', actif:true},
  {id:'planning', nom:'Planning & Agenda',  desc:'Agenda partagé, tournées techniciens, rendez-vous clients (bientôt disponible)',                  icon:'📅', color:'amber',  url:'#', actif:false},
  {id:'stock',    nom:'Gestion de stock',   desc:'Inventaire matériel, commandes fournisseurs, alertes rupture (bientôt disponible)',               icon:'📦', color:'purple', url:'#', actif:false},
];

const ROLE_LABELS = {admin:'Administrateur', commercial:'Commercial', technicien:'Technicien'};

let currentUser = null;

function doLogin() {
  const id = document.getElementById('loginUser').value.trim().toLowerCase();
  const pw = document.getElementById('loginPass').value;
  const user = USERS.find(u => u.id === id && u.password === pw);
  if (!user) {
    document.getElementById('loginErr').classList.add('show');
    document.getElementById('loginPass').value = '';
    return;
  }
  currentUser = user;
  sessionStorage.setItem('mf_user', JSON.stringify({id:user.id,nom:user.nom,role:user.role,acces:user.acces}));
  showPortal(user);
}

function doLogout() {
  sessionStorage.removeItem('mf_user');
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('portalPage').classList.remove('show');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

function showPortal(user) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('portalPage').classList.add('show');
  document.getElementById('userLabel').textContent = user.nom + ' (' + ROLE_LABELS[user.role] + ')';
  document.getElementById('welcomeTitle').textContent = 'Bonjour, ' + user.nom + ' !';
  const nbApps = user.role==='admin' ? APPS.filter(a=>a.actif).length : user.acces.length;
  document.getElementById('welcomeSub').textContent = user.role==='admin'
    ? 'Accès administrateur — toutes les applications disponibles.'
    : 'Vous avez accès à ' + nbApps + ' application(s).';
  document.getElementById('footerInfo').textContent = 'Connecté : ' + user.nom + ' — ' + new Date().toLocaleString('fr-FR');

  // Apps
  const grid = document.getElementById('appsGrid');
  grid.innerHTML = '';
  APPS.forEach(app => {
    const hasAccess = user.role==='admin' || user.acces.includes(app.id);
    const card = document.createElement('a');
    card.className = 'app-card' + (hasAccess && app.actif ? '' : ' locked');
    card.href = hasAccess && app.actif ? app.url : '#';
    if (!hasAccess || !app.actif) card.onclick = e => e.preventDefault();
    const statusClass = hasAccess && app.actif ? 'available' : !hasAccess ? 'locked' : 'soon';
    const statusText = hasAccess && app.actif ? '● Disponible' : !hasAccess ? '🔒 Accès restreint' : '⏳ Bientôt disponible';
    card.innerHTML = `
      <div class="app-card-header">
        <div class="app-icon ${app.color}">${app.icon}</div>
        <div class="app-card-title">${app.nom}</div>
      </div>
      <div class="app-card-desc">${app.desc}</div>
      <span class="app-status ${statusClass}"><span class="status-dot"></span>${statusText}</span>`;
    grid.appendChild(card);
  });

  // Admin
  if (user.role==='admin') {
    document.getElementById('adminSection').style.display = 'block';
    const ug = document.getElementById('usersGrid');
    ug.innerHTML = '';
    USERS.forEach(u => {
      const init = u.nom.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      ug.innerHTML += `<div class="user-card">
        <div class="user-av ${u.role}">${init}</div>
        <div>
          <div class="user-info-name">${u.nom}</div>
          <div class="user-info-id">@${u.id}</div>
          <span class="role-pill ${u.role}">${ROLE_LABELS[u.role]}</span>
        </div>
      </div>`;
    });
  }
}

// Entrée clavier
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginPage').style.display!=='none') doLogin();
});

// Restaurer session
const saved = sessionStorage.getItem('mf_user');
if (saved) {
  try {
    const u = JSON.parse(saved);
    const full = USERS.find(x=>x.id===u.id);
    if (full) { currentUser=full; showPortal(full); }
  } catch(e) {}
}
</script>
</body>
</html>
