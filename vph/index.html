<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediFlow — Gestion Dossiers PSDM</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2336; --border:#2a2f45;
  --accent:#3b82f6; --accent2:#6366f1; --green:#22c55e; --amber:#f59e0b;
  --red:#ef4444; --purple:#a855f7; --cyan:#06b6d4;
  --text:#e8eaf0; --text2:#8b92a8; --text3:#4f5671;
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--accent)}
.nav-icon{width:20px;text-align:center;font-size:15px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.main{margin-left:240px;flex:1;padding:26px;max-width:calc(100vw - 240px)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:12px}
.page-title{font-size:23px;font-weight:700;letter-spacing:-.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff} .btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)} .btn-secondary:hover{background:var(--border)}
.btn-green{background:var(--green);color:#fff} .btn-green:hover{background:#16a34a}
.btn-amber{background:var(--amber);color:#1a1200} .btn-red{background:var(--red);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px} .btn-lg{padding:13px 22px;font-size:15px;border-radius:var(--radius)}
.btn-ghost{background:transparent;color:var(--text2);padding:7px 11px} .btn-ghost:hover{color:var(--text);background:var(--surface2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--accent)} .stat-card.green::before{background:var(--green)}
.stat-card.amber::before{background:var(--amber)} .stat-card.purple::before{background:var(--purple)}
.stat-card.red::before{background:var(--red)} .stat-card.cyan::before{background:var(--cyan)}
.stat-value{font-size:30px;font-weight:700;letter-spacing:-1px;font-family:'DM Mono',monospace}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 13px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 13px;font-size:13px;border-bottom:1px solid rgba(42,47,69,.5)}
tr:hover td{background:rgba(255,255,255,.02)} tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-eval{background:rgba(99,102,241,.15);color:#818cf8} .badge-eval::before{background:#818cf8}
.badge-essai{background:rgba(6,182,212,.15);color:#22d3ee} .badge-essai::before{background:#22d3ee}
.badge-dep{background:rgba(245,158,11,.15);color:#fbbf24} .badge-dep::before{background:#fbbf24}
.badge-attente{background:rgba(168,85,247,.15);color:#c084fc} .badge-attente::before{background:#c084fc;animation:pulse 2s infinite}
.badge-accord{background:rgba(34,197,94,.15);color:#4ade80} .badge-accord::before{background:#4ade80}
.badge-commande{background:rgba(59,130,246,.15);color:#60a5fa} .badge-commande::before{background:#60a5fa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:780px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
.modal-wide{max-width:960px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title{font-size:15px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface)}
.stepper{display:flex;align-items:flex-start;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.step-item{display:flex;align-items:flex-start;flex:1;min-width:0}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s}
.step-circle.done{background:var(--green);color:#fff}
.step-circle.active{background:var(--accent);color:#fff;box-shadow:0 0 0 4px rgba(59,130,246,.2)}
.step-circle.pending{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.step-line{flex:1;height:2px;background:var(--border);margin:14px 3px 0;min-width:8px}
.step-line.done{background:var(--green)}
.step-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.step-label{font-size:9px;color:var(--text2);text-align:center;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.fs{display:flex;flex-direction:column;gap:6px}
.fg{display:grid;gap:12px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.fg-4{grid-template-columns:1fr 1fr 1fr 1fr}
.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--text2)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .2s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.cb-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cb-item{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;user-select:none}
.cb-item:hover{border-color:var(--accent);color:var(--accent)}
.cb-item.checked{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent)}
.cb-item input[type=checkbox]{display:none}
.radio-group{display:flex;gap:8px;flex-wrap:wrap}
.radio-item{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;user-select:none}
.radio-item.selected{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent)}
.info-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.info-box.amber{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.2);color:#fbbf24}
.alert{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px}
.alert-amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
.alert-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.alert-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.countdown-widget{background:linear-gradient(135deg,rgba(168,85,247,.1),rgba(99,102,241,.1));border:1px solid rgba(168,85,247,.3);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px}
.countdown-digits{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;color:#c084fc}
.countdown-urgent{color:var(--red)!important}
.process-step{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border)}
.process-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.process-step-num.done{background:rgba(34,197,94,.2);color:var(--green)}
.process-step-num.active{background:rgba(59,130,246,.2);color:var(--accent)}
.process-step-num.pending{background:var(--surface);color:var(--text3)}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:7px 13px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;background:none;border-left:none;border-right:none;border-top:none;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.filter-pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-pill:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.search-bar{position:relative}
.search-bar input{padding-left:34px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.lpp-chip{font-family:'DM Mono',monospace;font-size:11px;background:rgba(6,182,212,.1);color:var(--cyan);padding:2px 7px;border-radius:4px;border:1px solid rgba(6,182,212,.2)}
.file-chip{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover{border-color:var(--accent);background:rgba(59,130,246,.03)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.sig-pad{border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:crosshair;touch-action:none}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:8px}
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;align-items:center;gap:10px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-backdrop.visible{display:block}
.adj-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.adj-table th{background:var(--surface2);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--border)}
.adj-table td{padding:6px 10px;border:1px solid var(--border);vertical-align:middle}
.adj-table tr:hover td{background:rgba(255,255,255,.02)}
.pdf-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:14px;max-width:100vw;padding-top:68px}
  .hamburger,.mobile-header{display:flex}
  .fg-2,.fg-3,.fg-4{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .page-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>

};

const pdfSection = (doc, titre, y, w=210, m=14) => {
  doc.setFillColor(235,240,255);

  doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(30,64,175);

  return y+10;
};

// Affiche une ligne label + valeur dans un tableau à deux colonnes propre
// lCol = largeur colonne label (défaut 55), retourne le nouveau y
const pdfRow = (doc, label, value, y, lCol=55, pageW=210, m=14) => {
  const colW = pageW - m*2;
  const vCol = colW - lCol;
  const val = String(value||'').trim() || '—';

  // fond alterné très léger
  doc.setFillColor(248,249,252);
  doc.rect(m, y-3.5, colW, 7.5, 'F');
  doc.setDrawColor(220,225,240);
  doc.rect(m, y-3.5, colW, 7.5, 'S');

  // label
  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(80,90,120);
  doc.text(label, m+2, y+0.5);

  // séparateur vertical
  doc.setDrawColor(200,208,230);
  doc.line(m+lCol, y-3.5, m+lCol, y+4);

  // valeur — gère le retour à la ligne si trop long
  doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20);
  const lines = doc.splitTextToSize(val, vCol-4);
  doc.text(lines, m+lCol+3, y+0.5);
  const rowH = Math.max(7.5, lines.length * 5);
  return y + rowH + 1;
};

// Ligne sur 2 colonnes côte à côte (pour les champs courts : Oui/Non, dates...)
const pdfRow2 = (doc, items, y, pageW=210, m=14) => {
  const colW = (pageW - m*2) / items.length;
  doc.setFillColor(248,249,252);
  doc.rect(m, y-3.5, pageW-m*2, 7.5, 'F');
  doc.setDrawColor(220,225,240);
  doc.rect(m, y-3.5, pageW-m*2, 7.5, 'S');
  items.forEach(([label, value], i) => {
    const x = m + i*colW;
    const lCol = Math.min(colW*0.52, 55);
    doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(80,90,120);
    doc.text(label, x+2, y+0.5);
    doc.setDrawColor(200,208,230);
    doc.line(x+lCol, y-3.5, x+lCol, y+4);
    doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20);
    const val = String(value||'').trim()||'—';
    doc.text(val, x+lCol+2, y+0.5, {maxWidth: colW-lCol-4});
  });
  return y + 8.5;
};

const SigPad = ({onSave, onClose}) => {
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const pos = (e,c) => { const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start = e => { drawing.current=true; last.current=pos(e,ref.current); };
  const draw = e => {
    if(!drawing.current) return; e.preventDefault();
    const c=ref.current, ctx=c.getContext('2d'), p=pos(e,c);
    ctx.beginPath(); ctx.moveTo(last.current.x,last.current.y); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#1e3a8a'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke();
    last.current=p;
  };
  const stop = () => { drawing.current=false; };
  const clear = () => ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height);
  return (
    <div className="modal-overlay">
      <div className="modal" style={{maxWidth:500}}>
        <div className="modal-header"><span className="modal-title">✍️ Signature électronique</span><button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Signez dans la zone ci-dessous avec votre doigt ou stylet.</p>

    </div>

// ── Countdown ─────────────────────────────────────────────────────────────────
const Countdown = ({dateEnvoi}) => {
  const ech = addDays(dateEnvoi,15);
  const rem = daysUntil(ech);
  const urgent = rem!==null && rem<=3;
  const past = rem!==null && rem<0;
  return (
    <div className="countdown-widget">
      <div style={{fontSize:28}}>{past?'⏰':urgent?'⚠️':'⏳'}</div>
      <div>
        <div className={`countdown-digits ${urgent||past?'countdown-urgent':''}`}>
          {past?'DÉPASSÉ':rem===0?'AUJOURD\'HUI':`J-${rem}`}
        </div>
        <div style={{fontSize:12,color:'var(--text2)'}}>
          {past?`Délai dépassé depuis ${Math.abs(rem)} jour(s) — Relancer la CPAM`:`Réponse CPAM attendue le ${ech.toLocaleDateString('fr-FR')}`}
        </div>
      </div>
      {(urgent||past)&&<span className="badge badge-dep" style={{marginLeft:'auto'}}>Relancer</span>}
    </div>
  );
};

                <td><span className="lpp-chip">{a.code}</span></td>
              </tr>
            ))}

        <div className="section-title" style={{marginTop:18}}>Adjonctions sur devis (hors nomenclature)</div>

    () => <StepDocs d={d} set={set} />,

            ['🔢 N° SS',d.nsecu],
            ['👨‍⚕️ Prescripteur',d.prescripteurNom],
            ['📋 N° RPPS',d.prescripteurRPPS],
            ['♿ Type VPH',d.typeVPH],
            ['📏 Taille / Poids',`${d.taille||'?'} cm / ${d.poids||'?'} kg`],
            ['🔧 Adjonctions',`${(d.adjonctions||[]).length} sélectionnée(s)`],
            ['🩹 PAP',`${(d.papSelectionnes||[]).length} sélectionné(s)`],
            ['📄 Fichiers',`${(d.fichiers||[]).length} document(s)`],
            ['✍️ Signé',d.signature?'Oui ✅':'Non ❌'],

          <button className="btn btn-green" onClick={()=>generateEvaluation(d)}>📄 Fiche Évaluation</button>
          <button className="btn btn-primary" onClick={()=>generatePreconisation(d)}>📄 Fiche Préconisation</button>

  ];

  return (
    <div className="modal-overlay">
      <div className="modal modal-wide">
        <div className="modal-header">
          <div>
            <div className="modal-title">{existing?'✏️ Modifier le dossier':'➕ Nouveau dossier VPH'}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:1}}>{d.nom||'…'} {d.prenom||''} {d.typeVPH?`— ${d.typeVPH}`:''}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {/* Stepper */}
          <div className="stepper">
            {STEPS.map((label,i)=>(
              <div key={i} className="step-item">
                <div className="step-col" style={{cursor:'pointer'}} onClick={()=>setStep(i)}>
                  <div className={`step-circle ${i<step?'done':i===step?'active':'pending'}`}>{i<step?'✓':i+1}</div>
                  <div className="step-label">{label}</div>
                </div>
                {i<STEPS.length-1&&<div className={`step-line ${i<step?'done':''}`}/>}
              </div>
            ))}
          </div>
          {steps[step]()}
        </div>
        <div className="modal-footer">
          {step>0&&<button className="btn btn-secondary" onClick={()=>setStep(s=>s-1)}>← Précédent</button>}
          {step<STEPS.length-1
            ?<button className="btn btn-primary" onClick={()=>setStep(s=>s+1)}>Suivant →</button>
            :<button className="btn btn-green btn-lg" onClick={()=>onSave(d)}>💾 Enregistrer</button>
          }
        </div>
      </div>
    </div>
  );
};

    {label:'Évaluation des besoins réalisée'},
    {label:'Fiche de préconisation rédigée'},

    {label:'Attente réponse CPAM (15 jours)'},

    {label:'Commande passée au fournisseur'},

    <div className="modal-overlay">

            <div className="modal-title">📁 {dossier.nom} {dossier.prenom}</div>

          {tab==='suivi'&&(
            <div>

                    </div>
                    {active&&si<STATUTS.length-1&&(
                      <button className="btn btn-primary btn-sm" onClick={()=>onStatusChange(dossier.id,STATUTS[si+1])}>Valider →</button>

            <div className="fg fg-2">
              {[

                ['Ville',dossier.ville],['Téléphone',dossier.tel],
                ['Email',dossier.email],['Mutuelle',dossier.mutuelle],
                ['Prescripteur',dossier.prescripteurNom],['N° RPPS',dossier.prescripteurRPPS],
                ['Spécialité',dossier.prescripteurSpecialite],['Ordonnance du',fmtDate(dossier.dateOrdonnance)],

                window.open(`mailto:?subject=${subj}&body=${body}`);

                <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>⚠️ Zone dangereuse</div>

                  if(window.confirm(`Supprimer définitivement le dossier de ${dossier.nom} ${dossier.prenom} ?\n\nCette action est irréversible.`)){
                    onDelete(dossier.id);
                  }

              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Dashboard ──────────────────────────────────────────────────────────────────
const Dashboard = ({dossiers,onNew,onNewSimple,onView}) => {
  const alerts=dossiers.filter(d=>d.statut==='En attente CPAM'&&d.dateDepDEP&&daysUntil(addDays(d.dateDepDEP,10))<=0);
  const stats=STATUTS.reduce((a,s)=>{a[s]=dossiers.filter(d=>d.statut===s).length;return a},{});
  const colors=['blue','cyan','amber','purple','green','commande'];
  const icons=['📋','🔬','📮','⏳','✅','📦'];
  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Tableau de bord</div><div className="page-subtitle">{dossiers.length} dossier(s) au total</div></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-lg" onClick={onNew}>➕ Nouveau dossier VPH (circuit complet)</button>
          <button className="btn btn-secondary btn-lg" onClick={onNewSimple}>➕ Circuit simplifié (FMP/FMPR/BASE)</button>
        </div>
      </div>
      {alerts.map(d=>(

        </div>

      <div className="stats-grid">

          <div key={s} className={`stat-card ${colors[i]}`}>
            <div style={{fontSize:18,marginBottom:5}}>{icons[i]}</div>
            <div className="stat-value">{stats[s]||0}</div>

        <div key={d.id} style={{marginBottom:10,cursor:'pointer'}} onClick={()=>onView(d)}>

};

// ── Liste dossiers ─────────────────────────────────────────────────────────────
const Liste = ({dossiers,onNew,onNewSimple,onView,onEdit,onDelete}) => {
  const [filter,setFilter]=useState('Tous');
  const [search,setSearch]=useState('');
  const filtered=dossiers.filter(d=>{
    const ms=filter==='Tous'||d.statut===filter;
    const ms2=!search||`${d.nom} ${d.prenom} ${d.nsecu} ${d.typeVPH}`.toLowerCase().includes(search.toLowerCase());
    return ms&&ms2;
  });
  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Dossiers clients</div><div className="page-subtitle">{filtered.length} dossier(s)</div></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={onNew}>➕ Circuit complet</button>
          <button className="btn btn-secondary" onClick={onNewSimple}>➕ Circuit simplifié</button>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div className="search-bar" style={{flex:1,maxWidth:360}}>
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Nom, N°SS, type VPH..."/>
        </div>
      </div>
      <div className="filters">
        {['Tous',...STATUTS].map(s=><div key={s} className={`filter-pill ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</div>)}
      </div>
      <div className="card" style={{padding:0}}>
        {filtered.length===0
          ?<div className="empty-state"><div className="empty-icon">📂</div><div>Aucun dossier trouvé</div></div>
          :<div className="table-wrap">
            <table>
              <thead><tr><th>Patient</th><th>N° SS</th><th>Type VPH</th><th>Statut</th><th>Créé le</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(d=>(
                  <tr key={d.id} style={{cursor:'pointer'}} onClick={()=>onView(d)}>
                    <td><strong>{d.nom} {d.prenom}</strong></td>
                    <td><span style={{fontFamily:'DM Mono',fontSize:11,color:'var(--text2)'}}>{d.nsecu||'—'}</span></td>
                    <td>
                      {d.typeVPH?<span className="lpp-chip">{d.typeVPH}</span>:'—'}
                      {d.circuit==='simple'&&<span style={{marginLeft:5,fontSize:10,background:'rgba(6,182,212,.15)',color:'var(--cyan)',padding:'2px 6px',borderRadius:4,border:'1px solid rgba(6,182,212,.2)'}}>
                        {d.motifSimple==='renouvellement'?'Renouvellement':'Hors HAS'}
                      </span>}
                    </td>
                    <td><span className={`badge ${STATUT_STYLES[d.statut]}`}>{d.statut}</span></td>
                    <td style={{color:'var(--text2)',fontSize:12}}>{fmtDate(d.dateCreation)}</td>
                    <td onClick={e=>e.stopPropagation()}>
                      <div style={{display:'flex',gap:5}}>
                        <button className="btn btn-secondary btn-sm" onClick={()=>onView(d)}>👁</button>
                        <button className="btn btn-secondary btn-sm" onClick={()=>onEdit(d)}>✏️</button>
                        <button className="btn btn-red btn-sm" title="Supprimer" onClick={()=>{
                          if(window.confirm(`Supprimer le dossier de ${d.nom} ${d.prenom} ?\n\nCette action est irréversible.`)){
                            onDelete(d.id);

// ── App principale ─────────────────────────────────────────────────────────────
const App = () => {
  const [dossiers,setDossiers]=useState(initDossiers);
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [selected,setSelected]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  const [syncing, setSyncing] = useState(false);
  const [syncStatus, setSyncStatus] = useState('local'); // 'local' | 'synced' | 'error'

  // Charger depuis JSONBin au démarrage
  useEffect(() => {
    if (!JSONBIN_CONFIGURED) return;
    setSyncing(true);
    syncLoad().then(data => {
      if (data && Array.isArray(data)) {
        setDossiers(data);
        localStorage.setItem('mf_v2', JSON.stringify(data));
        setSyncStatus('synced');
      }
      setSyncing(false);
    });
  }, []);

  // Sauvegarder localement + JSONBin à chaque modif
  useEffect(() => {
    localStorage.setItem('mf_v2', JSON.stringify(dossiers));
    if (!JSONBIN_CONFIGURED) return;
    setSyncStatus('syncing');
    syncSave(dossiers).then(() => setSyncStatus('synced')).catch(() => setSyncStatus('error'));
  }, [dossiers]);

  const saveDossier = d => {
    setDossiers(prev=>{const i=prev.findIndex(x=>x.id===d.id); return i>=0?prev.map(x=>x.id===d.id?d:x):[...prev,d];});
    setModal(null);
  };
  const updateStatus = (id,statut) => {
    setDossiers(prev=>prev.map(d=>d.id===id?{...d,statut}:d));
    setSelected(prev=>prev&&prev.id===id?{...prev,statut}:prev);
  };

  const exportExcel = () => {
    const rows=dossiers.map(d=>({
      'Nom':d.nom,'Prénom':d.prenom,'N° SS':d.nsecu,'Date naissance':d.dateNaissance,
      'Adresse':d.adresse,'Code postal':d.codePostal,'Ville':d.ville,'Téléphone':d.tel,'Email':d.email,
      'Prescripteur':d.prescripteurNom,'N° RPPS':d.prescripteurRPPS,
      'Type VPH':d.typeVPH,'Mutuelle':d.mutuelle,'Prise en charge':d.priseEnCharge,
      'Statut':d.statut,'Date DEP':d.dateDepDEP||'','N° Accord CPAM':d.noAccordCPAM||'',
      'Adjonctions':(d.adjonctions||[]).join(', '),'Créé le':fmtDate(d.dateCreation),'Notes':d.notes||'',
    }));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Dossiers');
    XLSX.writeFile(wb,`meditec_export_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const exportJSON = () => {
    const blob=new Blob([JSON.stringify(dossiers,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`meditec_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
  };

  const deleteDossier = (id) => {
    setDossiers(prev=>prev.filter(d=>d.id!==id));
    setModal(null);
    setSelected(null);
  };

  const alertCount=dossiers.filter(d=>d.statut==='En attente CPAM'&&d.dateDepDEP&&daysUntil(addDays(d.dateDepDEP,10))<=0).length;

  const nav=[
    {key:'dashboard',icon:'📊',label:'Tableau de bord'},
    {key:'dossiers',icon:'📁',label:'Dossiers clients'},
    {key:'relances',icon:'🔔',label:'Relances',badge:alertCount},
    {key:'parametres',icon:'⚙️',label:'Paramètres'},
  ];

  const renderPage = () => {
    if(page==='dashboard') return <Dashboard dossiers={dossiers} onNew={()=>setModal('new')} onNewSimple={()=>setModal('new-simple')} onView={d=>{setSelected(d);setModal('view');}}/>;
    if(page==='dossiers') return <Liste dossiers={dossiers} onNew={()=>setModal('new')} onNewSimple={()=>setModal('new-simple')} onView={d=>{setSelected(d);setModal('view');}} onEdit={d=>{setSelected(d);setModal('edit');}} onDelete={deleteDossier}/>;
    if(page==='relances') return <Relances dossiers={dossiers} onView={d=>{setSelected(d);setModal('view');}}/>;
    if(page==='parametres') return <Parametres/>;
  };

  return (
    <div className="app-shell">
      {/* Mobile header */}
      <div className="mobile-header">
        <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div className="logo-icon" style={{width:28,height:28,fontSize:14}}>🏥</div>
          <span style={{fontWeight:700}}>MediFlow VPH</span>
        </div>
        <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setModal('new')}>+ Nouveau</button>
      </div>
      <div className={`sidebar-backdrop ${sidebarOpen?'visible':''}`} onClick={()=>setSidebarOpen(false)}/>
      <div className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <a href="../index.html" style={{display:'flex',alignItems:'center',gap:8,textDecoration:'none',color:'var(--text2)',fontSize:11,marginBottom:8,padding:'4px 2px'}}>
            ← Portail MEDITEC
          </a>
          <div className="logo-icon">🏥</div>
          <div><div className="logo-text">MediFlow</div><div className="logo-sub">VPH — PSDM</div></div>
        </div>
        <nav className="nav">
          {nav.map(n=>(
            <button key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>{setPage(n.key);setSidebarOpen(false);}}>
              <span className="nav-icon">{n.icon}</span>{n.label}
              {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Exports globaux</div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {JSONBIN_CONFIGURED && (
              <button className="btn btn-secondary btn-sm" style={{width:'100%',justifyContent:'flex-start'}} onClick={()=>{
                setSyncing(true);
                syncLoad().then(data=>{
                  if(data&&Array.isArray(data)){setDossiers(data);setSyncStatus('synced');}
                  setSyncing(false);
                });
              }}>🔄 Rafraîchir les données</button>
            )}
            <button className="btn btn-secondary btn-sm" style={{width:'100%',justifyContent:'flex-start'}} onClick={exportExcel}>📊 Export Excel</button>
            <button className="btn btn-secondary btn-sm" style={{width:'100%',justifyContent:'flex-start'}} onClick={exportJSON}>💾 Export JSON</button>
          </div>
          {selected && (
            <div style={{marginTop:10}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>
                PDF — {selected.nom} {selected.prenom}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {(dossiers.find(d=>d.id===selected.id)||selected)?.circuit==='simple'
                  ? <button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'flex-start'}}
                      onClick={()=>generateDAP(dossiers.find(d=>d.id===selected.id)||selected)}>
                      📄 Demande DAP
                    </button>
                  : <><button className="btn btn-green btn-sm" style={{width:'100%',justifyContent:'flex-start'}}
                      onClick={()=>generateEvaluation(dossiers.find(d=>d.id===selected.id)||selected)}>
                      📄 Fiche Évaluation
                    </button>
                    <button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'flex-start'}}
                      onClick={()=>generatePreconisation(dossiers.find(d=>d.id===selected.id)||selected)}>
                      📄 Fiche Préconisation
                    </button></>
                }
              </div>
            </div>
          )}
          <div style={{fontSize:10,color:'var(--text3)',marginTop:10,textAlign:'center'}}>
            MediFlow VPH v2.0 — {dossiers.length} dossier(s)
          </div>
          <div style={{fontSize:10,marginTop:6,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            {!JSONBIN_CONFIGURED && <span style={{color:'var(--amber)'}}>⚠️ Mode local (JSONBin non configuré)</span>}
            {JSONBIN_CONFIGURED && syncStatus==='synced' && <span style={{color:'var(--green)'}}>☁️ Synchronisé</span>}
            {JSONBIN_CONFIGURED && syncStatus==='syncing' && <span style={{color:'var(--text2)'}}>⏳ Sync...</span>}
            {JSONBIN_CONFIGURED && syncStatus==='error' && <span style={{color:'var(--red)'}}>⚠️ Erreur sync</span>}
          </div>
        </div>
      </div>
      <div className="main">{renderPage()}</div>

      {(modal==='new'||(modal==='edit'&&(!selected||selected.circuit!=='simple')))&&(
        <DossierForm existing={modal==='edit'?selected:null} onSave={saveDossier} onClose={()=>setModal(null)}/>
      )}
      {(modal==='edit'&&selected?.circuit==='simple')&&(
        <DossierSimpleForm existing={modal==='edit'?selected:null} onSave={saveDossier} onClose={()=>setModal(null)}/>
      )}
      {modal==='new-simple'&&(
        <DossierSimpleForm existing={null} onSave={saveDossier} onClose={()=>setModal(null)}/>
      )}
      {modal==='view'&&selected&&(
        <DossierDetail
          dossier={dossiers.find(d=>d.id===selected.id)||selected}
          onClose={()=>setModal(null)}
          onEdit={()=>setModal('edit')}
          onStatusChange={updateStatus}
          onDelete={deleteDossier}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
